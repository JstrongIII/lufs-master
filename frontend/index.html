<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LUFS Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        :root {
            --bg-color: #1a1a2e;
            --text-color: #ffffff;
            --accent: #7b2cbf;
            --accent-light: #9d4edd;
            --secondary: #16213e;
            --success: #00d26a;
            --error: #ff4757;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .lufs-display {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
        }
        
        .lufs-value {
            font-size: 72px;
            font-weight: 700;
            color: var(--accent-light);
            line-height: 1;
        }
        
        .lufs-label {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .file-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        
        .file-input {
            display: none;
        }
        
        .file-label {
            display: block;
            width: 100%;
            padding: 20px;
            border: 2px dashed var(--accent);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(123, 44, 191, 0.1);
        }
        
        .file-label:hover {
            background: rgba(123, 44, 191, 0.2);
            border-color: var(--accent-light);
        }
        
        .file-label.has-file {
            border-color: var(--success);
            background: rgba(0, 210, 106, 0.1);
        }
        
        .file-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .file-text {
            font-size: 16px;
            color: #ccc;
        }
        
        .file-name {
            color: var(--success);
            font-weight: 600;
            word-break: break-all;
        }
        
        .preset {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .preset:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        
        .preset:active {
            transform: scale(0.98);
        }
        
        .preset:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }
        
        .status.loading {
            display: block;
            background: rgba(123, 44, 191, 0.2);
            border: 1px solid var(--accent);
        }
        
        .status.success {
            display: block;
            background: rgba(0, 210, 106, 0.2);
            border: 1px solid var(--success);
        }
        
        .status.error {
            display: block;
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid var(--error);
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        
        .result {
            display: none;
            margin-top: 20px;
        }
        
        .result.show {
            display: block;
        }
        
        .stats {
            background: var(--secondary);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #888;
        }
        
        .stat-value {
            font-weight: 600;
        }
        
        audio {
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
        }
        
        .close-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid var(--accent);
            border-radius: 12px;
            background: transparent;
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
        }
        
        .api-url-input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid var(--accent);
            border-radius: 10px;
            background: var(--secondary);
            color: var(--text-color);
            font-size: 14px;
        }
        
        .api-url-input::placeholder {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎛 LUFS Master</h1>
        <p class="subtitle">Audio normalization to -8 LUFS</p>
        
        <div class="lufs-display">
            <div class="lufs-value">-8</div>
            <div class="lufs-label">Target LUFS</div>
        </div>
        
        <input 
            type="text" 
            id="apiUrl" 
            class="api-url-input" 
            placeholder="Backend URL (e.g., https://your-app.railway.app)"
        >
        
        <div class="file-input-wrapper">
            <input 
                type="file" 
                id="audioFile" 
                class="file-input" 
                accept="audio/*,.mp3,.wav,.flac,.ogg,.m4a"
            >
            <label for="audioFile" class="file-label" id="fileLabel">
                <div class="file-icon">🎵</div>
                <div class="file-text" id="fileText">Tap to select audio file</div>
            </label>
        </div>
        
        <button class="preset" id="masterBtn" onclick="master()">
            🎛 Master Track
        </button>
        
        <div class="status" id="status">
            <span id="statusText">Processing...</span>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
        
        <div class="result" id="result">
            <div class="stats" id="stats"></div>
            <audio id="player" controls></audio>
            <button class="close-btn" onclick="Telegram.WebApp.close()">Close</button>
        </div>
    </div>
    
    <script>
        // Initialize Telegram WebApp
        const tg = Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // State
        let selectedFile = null;
        let animationFrame = null;
        
        // File selection
        const fileInput = document.getElementById('audioFile');
        const fileLabel = document.getElementById('fileLabel');
        const fileText = document.getElementById('fileText');
        const masterBtn = document.getElementById('masterBtn');
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileLabel.classList.add('has-file');
                fileText.innerHTML = `<span class="file-name">${selectedFile.name}</span>`;
            }
        });
        
        // Animate progress bar
        function animateProgress() {
            const progress = document.getElementById('progress');
            let width = 0;
            const interval = setInterval(() => {
                width += Math.random() * 15;
                if (width > 90) width = 90;
                progress.style.width = width + '%';
            }, 500);
            return interval;
        }
        
        // Master track
        async function master() {
            if (!selectedFile) {
                showStatus('Please select an audio file', 'error');
                return;
            }
            
            const apiUrl = document.getElementById('apiUrl').value.trim();
            if (!apiUrl) {
                showStatus('Please enter the backend URL', 'error');
                return;
            }
            
            // Disable button
            masterBtn.disabled = true;
            masterBtn.textContent = '⏳ Processing...';
            
            // Show loading
            showStatus('Analyzing and normalizing audio...', 'loading');
            const progressInterval = animateProgress();
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('target_lufs', '-8');
            
            try {
                const response = await fetch(`${apiUrl}/master`, {
                    method: 'POST',
                    body: formData
                });
                
                clearInterval(progressInterval);
                document.getElementById('progress').style.width = '100%';
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Processing failed');
                }
                
                // Get audio blob
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                // Show result
                document.getElementById('player').src = url;
                
                // Stats
                document.getElementById('stats').innerHTML = `
                    <div class="stat-row">
                        <span class="stat-label">Target</span>
                        <span class="stat-value">-8 LUFS</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Output Format</span>
                        <span class="stat-value">MP3 320kbps</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Sample Rate</span>
                        <span class="stat-value">48kHz</span>
                    </div>
                `;
                
                document.getElementById('result').classList.add('show');
                document.getElementById('status').className = 'status success';
                document.getElementById('statusText').textContent = '✅ Mastering complete!';
                
            } catch (err) {
                clearInterval(progressInterval);
                showStatus('❌ ' + err.message, 'error');
            } finally {
                masterBtn.disabled = false;
                masterBtn.textContent = '🎛 Master Track';
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            document.getElementById('statusText').textContent = message;
        }
    </script>
</body>
</html>
